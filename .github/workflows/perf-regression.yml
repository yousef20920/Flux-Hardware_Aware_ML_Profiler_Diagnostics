name: Perf Regression

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  perf-regression:
    runs-on: ubuntu-latest
    env:
      THRESHOLD: "5"
      CURRENT_TRACE: trace-current.json
      BASELINE_TRACE: trace-baseline.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Install Flux
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Build dashboard
        run: |
          cd dashboard
          npm ci
          npm run build

      - name: Profile current
        run: |
          flux profile --script examples/profile_simple_model.py --output "$CURRENT_TRACE"

      - name: Prepare baseline
        run: |
          if [ -f ci/baseline/trace-baseline.json ]; then
            cp ci/baseline/trace-baseline.json "$BASELINE_TRACE"
          else
            echo "No checked-in baseline found; generating baseline in this run."
            flux profile --script examples/profile_simple_model.py --output "$BASELINE_TRACE"
          fi

      - name: Regression check
        run: |
          flux analyze --trace "$CURRENT_TRACE" --baseline "$BASELINE_TRACE" --threshold "$THRESHOLD"

      - name: Upload traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flux-traces
          path: |
            trace-current.json
            trace-baseline.json
